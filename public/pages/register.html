<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse — Register</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-wrap { width: 100%; max-width: 460px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo h1 { font-size: 28px; color: var(--white); font-weight: 700; }
    .auth-logo h1 span { color: var(--accent); }
    .auth-logo p { color: var(--sky); font-size: 13px; margin-top: 4px; }
    .auth-card { background: var(--white); border-radius: 12px; padding: 32px; }
    .auth-card h2 { font-size: 20px; color: var(--navy); margin-bottom: 24px; }
    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--sky); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Civic<span>Pulse</span></h1>
      <p>Create your account to start reporting</p>
    </div>
    <div class="auth-card">
      <h2>Create account</h2>
      <div class="alert alert-error"   id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="full_name">Full name</label>
          <input type="text" id="full_name" placeholder="e.g. Samuel Odhiambo" required/>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="ward_id">Your ward (estate)</label>
          <select id="ward_id">
            <option value="">— Select your ward —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters" required/>
        </div>
        <button class="btn btn-primary btn-full mt-1" type="submit" id="register-btn">
          Create account
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Already have an account? <a href="index.html">Sign in</a>
    </div>
  </div>
  <script src="../js/auth.js"></script>
</body>
</html>
