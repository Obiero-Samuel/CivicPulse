<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse — Login</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--navy); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo h1 { font-size: 32px; color: var(--white); font-weight: 700; }
    .auth-logo h1 span { color: var(--accent); }
    .auth-logo p { color: var(--sky); font-size: 14px; margin-top: 4px; }
    .auth-card { background: var(--white); border-radius: 12px; padding: 32px; }
    .auth-card h2 { font-size: 20px; color: var(--navy); margin-bottom: 24px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--sky); }
    .auth-footer a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <h1>Civic<span>Pulse</span></h1>
      <p>Community Issue Reporting — Nairobi Estates</p>
    </div>
    <div class="auth-card">
      <h2>Sign in to your account</h2>
      <div class="alert alert-error" id="error-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required/>
        </div>
        <button class="btn btn-primary btn-full mt-1" type="submit" id="login-btn">
          Sign in
        </button>
      </form>
    </div>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
  <script src="../js/auth.js"></script>
</body>
</html>
