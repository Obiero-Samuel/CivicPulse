<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<link rel="icon" type="image/png" href="../assets/favicon.png"/>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>CivicPulse — Page Not Found</title>
	<link rel="stylesheet" href="../css/style.css"/>
	<style>
		body {
			background: var(--bg-primary);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
			overflow: hidden;
		}
		.error-bg {
			position: fixed; inset: 0; z-index: 0; overflow: hidden;
		}
		.error-bg::before {
			content: '';
			position: absolute;
			width: 600px; height: 600px;
			background: radial-gradient(circle, rgba(239, 68, 68, 0.10) 0%, transparent 70%);
			top: -15%; left: -10%;
			animation: floatOrb 18s ease-in-out infinite;
		}
		.error-bg::after {
			content: '';
			position: absolute;
			width: 500px; height: 500px;
			background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
			bottom: -10%; right: -10%;
			animation: floatOrb 22s ease-in-out infinite reverse;
		}
		@keyframes floatOrb {
			0%, 100% { transform: translate(0, 0) scale(1); }
			25%      { transform: translate(60px, -40px) scale(1.1); }
			50%      { transform: translate(-30px, 60px) scale(0.95); }
			75%      { transform: translate(40px, 30px) scale(1.05); }
		}
		.mesh-grid {
			position: fixed; inset: 0; z-index: 0;
			background-image:
				linear-gradient(rgba(239, 68, 68, 0.02) 1px, transparent 1px),
				linear-gradient(90deg, rgba(239, 68, 68, 0.02) 1px, transparent 1px);
			background-size: 60px 60px;
		}
		.error-container {
			position: relative; z-index: 1;
			text-align: center;
			max-width: 500px;
			padding: 48px 40px;
			animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
		}
		.error-code {
			font-size: clamp(80px, 15vw, 140px);
			font-weight: 900;
			letter-spacing: -0.04em;
			line-height: 1;
			margin-bottom: 8px;
			background: linear-gradient(135deg, var(--danger), var(--neon-purple), var(--neon-blue));
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		.error-title {
			font-size: 22px;
			font-weight: 700;
			color: var(--text-primary);
			margin-bottom: 12px;
		}
		.error-desc {
			font-size: 14px;
			color: var(--text-secondary);
			line-height: 1.7;
			margin-bottom: 32px;
		}
		.error-actions {
			display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
		}
	</style>
</head>
<body>
	<div class="error-bg"></div>
	<div class="mesh-grid"></div>
	<div class="error-container">
		<div class="error-code">404</div>
		<h1 class="error-title">This page doesn't exist</h1>
		<p class="error-desc">
			The page you're looking for may have been moved, deleted, or never existed.
			Let's get you back on track.
		</p>
		<div class="error-actions">
			<a href="/" class="btn btn-primary">← Back to Home</a>
			<a href="/pages/index.html" class="btn btn-ghost">Sign In</a>
		</div>
	</div>
</body>
</html>
